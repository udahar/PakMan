[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-prompt-version-control"
version = "0.1.0"
description = "Git-style version control for prompts. Diff, branch, and roll back prompts."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "prompting"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["prompt_version_control*"]
