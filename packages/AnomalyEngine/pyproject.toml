[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-anomalyengine"
version = "0.1.0"
description = "Anomaly detection engine for AI agent behavior and system metrics."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["AnomalyEngine*"]
