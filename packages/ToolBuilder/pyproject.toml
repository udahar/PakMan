[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-toolbuilder"
version = "0.1.0"
description = "Tool builder. Scaffold new PakMan tools from spec, with type hints and tests."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "tools"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["ToolBuilder*"]
