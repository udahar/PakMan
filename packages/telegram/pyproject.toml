[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-telegram"
version = "0.2.0"
description = "Telegram bot: send messages and run a long-polling bot that forwards to any NeuralCanvas-compatible API."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "integration"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["telegram*"]
