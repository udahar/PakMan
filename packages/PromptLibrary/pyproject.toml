[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-promptlibrary"
version = "0.1.0"
description = "Searchable prompt library. Tag, version, and retrieve prompts by task type or keyword."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "prompting"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["PromptLibrary*"]
