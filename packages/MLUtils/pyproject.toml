[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-mlutils"
version = "0.1.0"
description = "Shared ML utility helpers: normalization, metrics, and numpy wrappers."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["MLUtils*"]
