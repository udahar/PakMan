[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-autodocgen"
version = "0.1.0"
description = "AI-powered self-maintaining documentation — AST extraction + surgical README patching."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "documentation", "ast", "readme", "antigrav"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["AutoDocGen*"]
