[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-bench"
version = "0.1.0"
description = "Evaluation framework for package candidates. Tests and measures fitness."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "evolution"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["Bench*"]
