[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-costoptimizer"
version = "0.1.0"
description = "Token cost optimizer. Routes tasks to cheapest capable model and enforces per-task spend limits."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "cost"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["CostOptimizer*"]
