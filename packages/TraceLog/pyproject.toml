[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-tracelog"
version = "0.1.0"
description = "Distributed AI prompt execution tracing — zero external dependencies."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "tracing", "observability", "spans", "antigrav"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["TraceLog*"]
