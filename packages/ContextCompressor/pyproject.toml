[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-contextcompressor"
version = "0.1.0"
description = "Token-aware context window manager — pinned messages, LLM summarization, 4-stage compression."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "context", "tokens", "compression", "antigrav"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["ContextCompressor*"]
