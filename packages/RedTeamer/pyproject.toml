[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-redteamer"
version = "0.1.0"
description = "Automated adversarial penetration suite for AI systems — jailbreaks, injections, bypass detection."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "red-team", "security", "adversarial", "antigrav"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["RedTeamer*"]
