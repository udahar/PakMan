[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-linkedin-export"
version = "0.1.0"
description = "Import your LinkedIn connections into Qdrant for intelligent network search and relationship mapping."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "knowledge"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["LinkedIn_Export*"]
