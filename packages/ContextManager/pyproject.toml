[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-contextmanager"
version = "0.1.0"
description = "Smart context window manager. Tracks token budgets and prioritizes content for optimal LLM performance."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "context"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["ContextManager*"]
