[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-patternminer"
version = "0.1.0"
description = "Pattern mining engine. Extract design patterns from repos without copying code."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "evolution"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["PatternMiner*"]
