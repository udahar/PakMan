[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-scheduler"
version = "0.1.0"
description = "Task scheduler for AI workflows. Cron-like scheduling with dependency tracking and retries."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "infrastructure"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["Scheduler*"]
