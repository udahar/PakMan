[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-neuralnetworks"
version = "0.1.0"
description = "Lightweight neural network building blocks and layer abstractions."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["NeuralNetworks*"]
