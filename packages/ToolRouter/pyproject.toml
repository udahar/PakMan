[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-toolrouter"
version = "0.1.0"
description = "Tool router. Selects the right tool for a given intent using semantic matching."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "tools"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["ToolRouter*"]
