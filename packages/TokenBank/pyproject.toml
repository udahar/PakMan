[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-tokenbank"
version = "0.1.0"
description = "Local token budget enforcement — stops runaway AI agents cold."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "tokens", "budget", "cost-control", "antigrav"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["TokenBank*"]
