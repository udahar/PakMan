[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-lora"
version = "0.1.0"
description = "LoRA fine-tuning modules for Alfred platform models. Training scripts, datasets, and adapter management for local Ollama models."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "ml"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["LoRA*"]
