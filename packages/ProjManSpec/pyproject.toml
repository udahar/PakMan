[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-projmanspec"
version = "0.1.0"
description = "Spec generator for ProjectManager. Turns candidates into buildable build specs via debate loop."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "productivity"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["ProjManSpec*"]
