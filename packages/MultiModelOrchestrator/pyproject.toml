[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-multimodelorchestrator"
version = "0.1.0"
description = "Multi-model orchestrator. Fans out tasks across multiple models and merges results."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "agents"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["MultiModelOrchestrator*"]
