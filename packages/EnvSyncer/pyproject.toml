[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-envsyncer"
version = "0.1.0"
description = "Environment state sync across AI agent sessions — snapshot, restore, diff."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "environment", "session", "state-sync", "antigrav"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["EnvSyncer*"]
