[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-autocoder"
version = "0.1.0"
description = "Code generation from specs. Generates package code automatically."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "evolution"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["Autocoder*"]
