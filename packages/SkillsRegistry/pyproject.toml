[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-skillsregistry"
version = "0.1.0"
description = "Skill registry. Central catalog of available skills with metadata and capability declarations."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "tools"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["SkillsRegistry*"]
