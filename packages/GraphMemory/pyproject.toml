[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-graphmemory"
version = "0.1.0"
description = "Semantic knowledge graph for AI conversational memory — SQLite backed, zero deps."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "knowledge-graph", "memory", "entities", "antigrav"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["GraphMemory*"]
