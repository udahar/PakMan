[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-claw"
version = "0.1.0"
description = "Thin CLI wrapper for Alfred AI platform."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "tools"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["Claw*"]
