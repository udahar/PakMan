[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-browserdriver"
version = "0.1.0"
description = "Headless browser control for AI agents — Playwright preferred, Selenium fallback."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ai", "browser", "playwright", "selenium", "antigrav"]
dependencies = []

[project.optional-dependencies]
playwright = ["playwright"]
selenium   = ["selenium"]

[tool.setuptools.packages.find]
where = [".."]
include = ["BrowserDriver*"]
