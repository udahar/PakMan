[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-stockai"
version = "0.1.0"
description = "AI-powered stock analysis. Loads historical price data via yfinance, identifies patterns, and generates LLM-assisted investment recommendations."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "finance"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["StockAI*"]
