[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-promptrouter"
version = "0.1.0"
description = "Experimental prompt routing layer. Selects the optimal prompt strategy and target model based on task type and available capacity."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "prompting"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["PromptRouter*"]
