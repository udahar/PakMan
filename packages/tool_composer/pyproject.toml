[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-tool-composer"
version = "0.1.0"
description = "Compose multiple tools into pipelines. Chain tool calls with routing and fallback."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "tools"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["tool_composer*"]
