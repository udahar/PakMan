[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-projman"
version = "0.1.0"
description = "CLI tools for Alfred ProjectManager integration. Create and query projects, epics, stories, and tickets from the command line."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "productivity"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["ProjMan*"]
