[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-telegram"
version = "0.1.0"
description = "Telegram bot integration. Scout pool, chat pool, and report delivery via the Alfred Telegram bot."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "integration"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["telegram*"]
