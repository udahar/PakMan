[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pakman-costs"
version = "0.1.0"
description = "Cost tracking and reporting. Logs per-request token costs and generates spend reports across vendors."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "pakman", "cost"]
dependencies = []

[tool.setuptools.packages.find]
where = [".."]
include = ["costs*"]
